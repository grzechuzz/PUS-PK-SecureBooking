name: SecureBooking CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show runtime versions
        run: |
          python --version
          python -c "import ssl; print(ssl.OPENSSL_VERSION)"
          openssl version

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Generate TLS certificates
        run: bash scripts/generate_certs.sh

      - name: Compile Python modules
        run: python -m py_compile securebooking/*.py tests/*.py

      - name: Run unit tests
        run: pytest -v

      - name: Run integration demo
        run: |
          bash scripts/reset_data.sh
          python -m securebooking.server --host 127.0.0.1 --port 7444 > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true; cat server.log' EXIT

          python - <<'PY'
          import socket
          import time

          deadline = time.time() + 10
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 7444), timeout=0.5):
                      break
              except OSError:
                  time.sleep(0.2)
          else:
              raise SystemExit("server did not start")
          PY

          python -m securebooking.demo
